services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: taskapi_db
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python API
  backend:
    build: ./backend
    container_name: taskapi_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment: # overiding the db url to us the service name
      - DATABASE_URL=postgresql://taskuser:taskpass@db:5432/taskdb
    ports:
      - "8000:8000"

  # React Frontend (Nginx)
  frontend:
    build: ./frontend
    container_name: taskapi_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
